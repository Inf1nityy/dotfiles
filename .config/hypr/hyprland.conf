#################################
# Variables & Inputs
#################################
$mod = SUPER

# Programs
$term = kitty
$menu = rofi -show drun

monitor=HDMI-A-1, 2560x1440@144, 0x0, 1

input {
    kb_layout = us,hr
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    accel_profile = flat
    touchpad {
        natural_scroll = false
    }
}

#################################
# Appearance (GitHub Dark)
#################################

general {
    allow_tearing = true
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    col.active_border = rgba(58a6ffcc)
    col.inactive_border = rgba(30363dee)
    
    layout = dwindle
}

decoration {
    rounding = 10
    
    blur {
        enabled = true
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.65, 0, 0.35, 1
    animation = windows, 1, 7, myBezier
    animation = fade, 1, 7, myBezier
    animation = workspaces, 1, 3, myBezier
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

#################################
# Key Bindings
#################################

# Basics
bind = $mod, Return, exec, $term
bind = $mod SHIFT, Q, killactive, 
bind = $mod, D, exec, $menu
bind = $mod, T, exec, swaync-client -t
bind = $mod SHIFT, T, exec, rofi -show emoji
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, E, exec, ~/.local/bin/powermenu
bind = $mod SHIFT, F, exec, ~/.local/bin/wallpaper-changer

# Layout
bind = $mod, F, fullscreen,
bind = $mod SHIFT, Space, togglefloating,
bind = $mod, P, pseudo, # dwindle
bind = $mod, J, togglesplit, # dwindle

# Focus (Vim keys)
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Focus (Arrow keys)
bind = $mod, Left, movefocus, l
bind = $mod, Right, movefocus, r
bind = $mod, Up, movefocus, u
bind = $mod, Down, movefocus, d

# Move (Vim keys)
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scratchpad (Special workspace in Hyprland)
bind = $mod SHIFT, minus, movetoworkspace, special
bind = $mod, minus, togglespecialworkspace,

# Resize Mode
bind = $mod, R, submap, resize
submap = resize
binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
bind = , escape, submap, reset 
submap = reset

# Media Keys
bindle = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindle = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindle = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Screenshots
bind = , Print, exec, ~/.local/bin/screenshot region
bind = SHIFT, Print, exec, ~/.local/bin/screenshot window
bind = CTRL, Print, exec, ~/.local/bin/screenshot all

# Scroll through existing workspaces with mainMod + scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

#################################
# Autostart
#################################
exec-once = waybar
exec-once = awww-daemon
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = gammastep-indicator -l 0:0
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
